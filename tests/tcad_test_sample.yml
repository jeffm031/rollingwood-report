# TCAD parser regression test — 50 parcels random-sampled with seed 42 from
# data/rollingwood_parcels.csv on 2026-04-20.
#
# Each entry records the raw CSV fields plus the expected parser output.
# `kind: entity` means the row should be skipped (written to
# tcad_unresolved_trusts.yml, not tier3_tcad.yml).
# `kind: individuals` means the listed persons should be extracted to
# tier3_tcad.yml.
#
# Labels produced by LLM reading the CSV; ambiguous cases are flagged with
# an `ambiguous:` field explaining the alternative reading. Jeff can re-label
# by editing this file and re-running the test.
#
# Label rules used:
# - Trust/LLC/Management/etc. → entity.
# - Joint-owner with 2+ tokens where last token is ≥4 letters (not a suffix)
#   → last token is separate surname.
# - Joint-owner where last token is 1-3 letters → middle initial, shared
#   primary surname.
# - OFN provides spouse or corrects truncation; takes precedence over
#   same-person extraction from a truncated Owner Name.

- property_id: "105468"
  owner_name: "LEE EDWARD & CYNTHIA R"
  owner_first_name: ""
  expected:
    kind: individuals
    persons:
      - "Edward Lee"
      - "Cynthia R Lee"

